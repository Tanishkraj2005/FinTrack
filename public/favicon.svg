<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Inner glass highlight -->
  <rect x="2" y="2" width="60" height="30" rx="12" fill="url(#glow)"/>

  <!-- Trending-up chart line -->
  <!-- Main rising line -->
  <polyline
    points="10,46  22,34  30,40  46,18"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="1"
  />

  <!-- Arrow head at top-right -->
  <polyline
    points="38,14  46,18  42,26"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Bar chart columns (subtle, behind line) -->
  <rect x="12" y="42" width="5" height="12" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="22" y="36" width="5" height="18" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="32" y="30" width="5" height="24" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="42" y="22" width="5" height="32" rx="1.5" fill="white" opacity="0.35"/>
</svg>
